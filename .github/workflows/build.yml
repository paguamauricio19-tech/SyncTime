name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
        - name: Android
          os: ubuntu-latest
          target: Android

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - checkout:
        uses: actions/checkout@v4

      - build:
        uses: geode-sdk/build-geode-action@main
        with:
          target: ${{ matrix.config.target }}
          combine: true
          
